<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mapa - CRM PickingUp!</title>

    <!-- Tus estilos globales -->
    <link rel="stylesheet" href="styles.css" />

    <!-- Leaflet -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />

    <!-- Supabase JS v2 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
      /* Layout consistente con tu UI */
      .map-page {
        padding: 16px;
      }

      .map-topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 12px;
      }

      .map-actions {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      #map {
        height: calc(100vh - 190px);
        min-height: 520px;
        border-radius: 16px;
        border: 1px solid rgba(2, 6, 23, 0.10);
        overflow: hidden;
      }
      :root[data-theme="dark"] #map {
        border-color: rgba(255,255,255,0.10);
      }

      /* Modal arriba del mapa (tu problema de z-index) */
      .modal-map {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 18px;
        background: rgba(0, 0, 0, 0.55);
        z-index: 99999;
      }
      :root[data-theme="dark"] .modal-map {
        background: rgba(0, 0, 0, 0.72);
      }

      .modal-map .modal-card {
        width: min(860px, 96vw);
        max-height: 88vh;
        overflow: auto;
        border-radius: 18px;
        border: 1px solid rgba(2, 6, 23, 0.10);
        background: rgba(255,255,255,0.98);
        padding: 16px;
      }
      :root[data-theme="dark"] .modal-map .modal-card {
        border-color: rgba(0,229,255,0.25);
        background: rgba(12,12,12,0.96);
      }

      .modal-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 10px;
      }
      .modal-head h2 {
        margin: 0;
        font-size: 18px;
      }

      .grid-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      @media (max-width: 820px) {
        #map { height: calc(100vh - 220px); }
        .grid-2 { grid-template-columns: 1fr; }
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .field label {
        font-size: 13px;
        opacity: 0.9;
      }

      .input {
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid rgba(2, 6, 23, 0.12);
        background: rgba(255,255,255,0.92);
        outline: none;
      }
      :root[data-theme="dark"] .input {
        border-color: rgba(255,255,255,0.10);
        background: rgba(255,255,255,0.03);
        color: #f3f4f6;
      }

      .modal-foot {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        margin-top: 14px;
        flex-wrap: wrap;
      }

      /* Marcadores Leaflet como círculos */
      .marker-dot {
        width: 14px;
        height: 14px;
        border-radius: 999px;
        border: 2px solid rgba(255,255,255,0.95);
        box-shadow: 0 6px 18px rgba(0,0,0,0.18);
      }
      :root[data-theme="dark"] .marker-dot {
        border-color: rgba(12,12,12,0.9);
        box-shadow: 0 10px 28px rgba(0,0,0,0.55);
      }

      .legend {
        margin-top: 10px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }
      .legend-item {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid rgba(2,6,23,0.10);
        background: rgba(255,255,255,0.70);
        font-size: 12px;
      }
      :root[data-theme="dark"] .legend-item {
        border-color: rgba(255,255,255,0.10);
        background: rgba(255,255,255,0.03);
      }
      .legend-dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        border: 2px solid rgba(255,255,255,0.95);
      }
      :root[data-theme="dark"] .legend-dot {
        border-color: rgba(12,12,12,0.9);
      }
    </style>
  </head>

  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="sidebar-brand">
          <div class="sidebar-logo">PU</div>
          <div class="sidebar-brand-text">
            <div class="sidebar-title">PickingUp</div>
            <div class="sidebar-subtitle">CRM</div>
          </div>
        </div>

        <nav class="sidebar-nav" aria-label="Navegación principal">
          <a href="index.html" class="nav-item">
            <span class="nav-dot"></span><span>Clientes</span>
          </a>
          <a href="consumidores.html" class="nav-item">
            <span class="nav-dot"></span><span>Consumidores</span>
          </a>
          <a href="calendario.html" class="nav-item">
            <span class="nav-dot"></span><span>Calendario</span>
          </a>
          <a href="mapa.html" class="nav-item active" aria-current="page">
            <span class="nav-dot"></span><span>Mapa</span>
          </a>
          <a href="estadisticas.html" class="nav-item">
            <span class="nav-dot"></span><span>Estadísticas</span>
          </a>
        </nav>

        <div class="sidebar-foot muted">
          Navegación
        </div>
      </aside>

      <div class="app-content">

    <main class="container map-page">
      <div class="map-topbar">
        <div>
          <h1 style="margin: 0 0 6px 0">Mapa de clientes</h1>
          <div class="muted">Click en el mapa para crear. Click en un marcador para editar/eliminar.</div>
        </div>

        <div class="map-actions">
          <button type="button" id="btnToggleTheme" class="btn-secundario theme-toggle">
            Modo noche
          </button>

          <button type="button" id="btnUbicarme" class="btn-secundario">
            Ubicarme
          </button>

          <button type="button" id="btnRegistrarAqui" class="btn-secundario">
            Registrar donde estoy
          </button>

          <button type="button" id="btnRefrescar" class="btn-secundario">
            Refrescar
          </button>
        </div>
      </div>

      <div id="map"></div>

      <div class="legend" id="legend"></div>
    </main>

    <!-- MODAL -->
    <div id="modalCliente" class="modal-map" aria-hidden="true">
      <div class="modal-card">
        <div class="modal-head">
          <h2 id="modalTitle">Nuevo cliente</h2>
          <button type="button" id="btnCerrarModal" class="btn-secundario">Cerrar</button>
        </div>

        <form id="formClienteMapa">
          <input type="hidden" id="clienteId" />
          <input type="hidden" id="lat" />
          <input type="hidden" id="lng" />

          <div class="grid-2">
            <div class="field">
              <label for="nombre">Nombre *</label>
              <input class="input" id="nombre" required />
            </div>

            <div class="field">
              <label for="apellido">Apellido</label>
              <input class="input" id="apellido" />
            </div>

            <div class="field">
              <label for="telefono">Número de celular</label>
              <input class="input" id="telefono" />
            </div>

            <div class="field">
              <label for="mail">Mail</label>
              <input class="input" id="mail" type="email" placeholder="cliente@dominio.com" />
            </div>

            <div class="field">
              <label for="direccion">Dirección</label>
              <input class="input" id="direccion" placeholder="Ej: Av. Rivadavia 1234, Haedo" />
            </div>

            <div class="field">
              <label for="rubro">Rubro</label>
              <input class="input" id="rubro" placeholder="Ej: Gastronomía, Retail" />
            </div>

            <div class="field">
              <label for="responsable">Responsable</label>
              <select class="input" id="responsable">
                <option value="">(Sin asignar)</option>
                <option value="Toto">Toto</option>
                <option value="Ruben">Ruben</option>
                <option value="Tincho(B)">Tincho(B)</option>
                <option value="Fran">Fran</option>
                <option value="Ari">Ari</option>
                <option value="Nati">Nati</option>
                <option value="Dani">Dani</option>
                <option value="Otro">Otro</option>
              </select>
            </div>

            <div class="field">
              <label for="estado">Estado</label>
              <select class="input" id="estado" required>
                <option value="1 - Cliente relevado">1 - Cliente relevado</option>
                <option value="2 - Local Visitado No Activo">2 - Local Visitado No Activo</option>
                <option value="3 - Primer Ingreso">3 - Primer Ingreso</option>
                <option value="4 - Local Creado">4 - Local Creado</option>
                <option value="5 - Local Visitado Activo">5 - Local Visitado Activo</option>
                <option value="6 - Local No Interesado">6 - Local No Interesado</option>
              </select>
            </div>

            <div class="field">
              <label for="fecha_contacto">Cuándo se contactó</label>
              <input class="input" id="fecha_contacto" type="date" />
            </div>
          </div>

          <div class="modal-foot">
            <div class="muted" id="coordHint">Lat/Lng: -</div>

            <div style="display:flex; gap:10px; flex-wrap:wrap;">
              <button type="button" id="btnEliminar" class="btn-secundario" style="display:none;">
                Eliminar
              </button>
              <button type="submit" id="btnGuardar" class="btn-primario">
                Guardar
              </button>
            </div>
          </div>
        </form>
      </div>
    </div>

    <!-- Leaflet JS -->
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>

    <script src="mapa.js"></script>

      </div>
    </div>
  </body>
</html>
