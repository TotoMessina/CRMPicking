<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Estadísticas CRM</title>
  <link rel="stylesheet" href="styles.css" />
  <!-- Supabase JS v2 -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <main class="container">
    <h1>Estadísticas CRM</h1>

    <section class="controls">
      <a href="index.html" class="btn-link">Volver al CRM</a>
      <button type="button" id="btnToggleTheme" class="btn-secundario theme-toggle">
        Modo noche 🌙
      </button>
    </section>

    <!-- Panel de rubros -->
    <section class="form-box">
      <h2>Distribución por Rubro</h2>
      <p id="resumenRubros" class="texto-resumen"></p>
      <canvas id="chartRubros" height="160"></canvas>
    </section>

    <!-- Panel de estados -->
    <section class="form-box">
      <h2>Estados de Clientes</h2>
      <p id="resumenEstados" class="texto-resumen"></p>
      <canvas id="chartEstados" height="160"></canvas>
    </section>
  </main>

  <script src="stats.js"></script>
</body>
</html>
