<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CRM - Login</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
  <div class="login-split-layout">
    <!-- Left: Brand Panel -->
    <div class="login-brand-panel">
      <div class="brand-content">
        <div class="brand-logo">PU</div>
        <h1>PickingUp</h1>
        <p>Optimiza tu logística, simplifica tu día.</p>
      </div>
    </div>

    <!-- Right: Form Panel -->
    <div class="login-form-panel">
      <div class="login-form-container">
        <div class="login-header">
          <h2>Bienvenido</h2>
          <p class="muted">Ingresá tus credenciales para continuar</p>
        </div>

        <form id="formLogin" class="form-stack">
          <div class="field">
            <label for="display_name">Nombre de usuario</label>
            <input id="display_name" type="text" placeholder="Ej: Juan Pérez" autocomplete="nickname" />
          </div>

          <div class="field">
            <label for="email">Email</label>
            <input id="email" type="email" autocomplete="email" required placeholder="tu@email.com" />
          </div>

          <div class="field">
            <label for="password">Contraseña</label>
            <input id="password" type="password" autocomplete="current-password" required placeholder="••••••••" />
          </div>

          <div class="form-actions-stack">
            <button class="btn-primario btn-block" id="btnLogin" type="submit">Ingresar</button>
            <button class="btn-text" id="btnReset" type="button">Olvidé mi contraseña</button>
          </div>

          <div class="signup-prompt">
            <button class="btn-secundario btn-sm" id="btnSignup" type="button">Crear cuenta nueva</button>
          </div>

          <p class="muted text-center" id="msg" style="margin-top:16px; min-height: 20px;"></p>
        </form>

        <div class="theme-toggle-fixed">
          <button id="btnToggleTheme" class="btn-icon" type="button" title="Cambiar tema">🌗</button>
        </div>
      </div>
    </div>
  </div>


  <script src="auth.js"></script>
  <script src="common.js"></script>
  <script src="login.js"></script>
</body>

</html>
