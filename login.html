<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CRM - Login</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" type="image/png" href="imagen1.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2563eb">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
  <div class="login-split-layout">
    <!-- Left: Brand Panel -->
    <div class="login-brand-panel">
      <div class="brand-content">
        <div class="brand-logo">PU</div>
        <h1>PickingUp</h1>
        <p>Buen dia Ruben</p>
      </div>
    </div>

    <!-- Right: Form Panel -->
    <div class="login-form-panel">
      <div class="login-form-container">
        <div class="login-header">
          <h2>Bienvenido</h2>
          <p class="muted">Ingresá tus credenciales para continuar</p>
        </div>

        <form id="formLogin" class="form-stack">

          <div class="field">
            <label for="email">Email</label>
            <input id="email" type="email" autocomplete="email" required placeholder="tu@email.com" />
          </div>

          <div class="field">
            <label for="password">Contraseña</label>
            <input id="password" type="password" autocomplete="current-password" required placeholder="••••••••" />
          </div>

          <div class="form-actions-stack">
            <button class="btn-primario btn-block" id="btnLogin" type="submit">Ingresar</button>
            <button class="btn-text" id="btnReset" type="button">Olvidé mi contraseña</button>
          </div>

          <div class="signup-prompt">
            <span class="muted">¿No tenés cuenta?</span>
            <button class="btn-text" id="btnToggleSignup" type="button" style="margin-left:5px;">Crear cuenta</button>
          </div>

          <p class="muted text-center" id="msg" style="margin-top:16px; min-height: 20px;"></p>
        </form>

        <!-- Formulario de Registro (Oculto por defecto) -->
        <form id="formSignup" class="form-stack" style="display: none;">
          <div class="field">
            <label for="reg_display_name">Nombre y Apellido</label>
            <input id="reg_display_name" type="text" placeholder="Tu nombre real" required />
          </div>

          <div class="field">
            <label for="reg_email">Email</label>
            <input id="reg_email" type="email" autocomplete="email" required placeholder="tu@email.com" />
          </div>

          <div class="field">
            <label for="reg_password">Contraseña</label>
            <input id="reg_password" type="password" autocomplete="new-password" required
              placeholder="Mínimo 6 caracteres" />
          </div>

          <div class="field">
            <label for="reg_code">Código de Invitación</label>
            <input id="reg_code" type="text" placeholder="Código de empresa" required />
          </div>

          <div class="form-actions-stack" style="margin-top:12px;">
            <button class="btn-primario btn-block" id="btnDoSignup" type="submit">Registrarme</button>
            <button class="btn-secundario btn-block" id="btnBackToLogin" type="button">Volver al Login</button>
          </div>

          <p class="muted text-center" id="msgSignup" style="margin-top:16px; min-height: 20px;"></p>
        </form>

        <!-- Formulario de Actualizar Contraseña (Oculto por defecto) -->
        <form id="formUpdatePassword" class="form-stack" style="display: none;">
          <div class="field">
            <label for="new_password">Nueva Contraseña</label>
            <input id="new_password" type="password" autocomplete="new-password" required
              placeholder="Mínimo 6 caracteres" />
          </div>

          <div class="form-actions-stack" style="margin-top:12px;">
            <button class="btn-primario btn-block" id="btnSavePassword" type="submit">Guardar Contraseña</button>
          </div>

          <p class="muted text-center" id="msgUpdate" style="margin-top:16px; min-height: 20px;"></p>
        </form>

        <div class="theme-toggle-fixed">
          <button id="btnToggleTheme" class="btn-icon" type="button" title="Cambiar tema">🌗</button>
        </div>
      </div>
    </div>
  </div>


  <script src="auth.js"></script>
  <script src="common.js"></script>
  <script src="login.js"></script>
</body>

</html>
