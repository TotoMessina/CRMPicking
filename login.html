<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>CRM - Login</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>

  <body>
    <div class="container">
      <h1>Ingresar</h1>

      <div class="controls">
        <button id="btnToggleTheme" class="btn-secundario theme-toggle" type="button">Modo noche</button>
      </div>

      <div class="panel" style="max-width:520px; margin:0 auto;">
        <div class="panel-header">
          <h2>Acceso de usuarios</h2>
          <p>Ingresá con tu email y contraseña.</p>
        </div>

        <form id="formLogin" class="form-grid">
          <div class="field">
            <label for="display_name">Nombre de usuario</label>
            <input id="display_name" type="text" placeholder="Ej: Juan Pérez" autocomplete="nickname" />
          </div>

          <div class="form-row">
            <label for="email">Email</label>
            <input id="email" type="email" autocomplete="email" required />
          </div>

          <div class="form-row">
            <label for="password">Contraseña</label>
            <input id="password" type="password" autocomplete="current-password" required />
          </div>

          <div class="form-row" style="display:flex; gap:10px; flex-wrap:wrap;">
            <button class="btn-primario" id="btnLogin" type="submit">Ingresar</button>
            <button class="btn-secundario" id="btnReset" type="button">Recuperar contraseña</button>
          </div>

          <p class="muted" id="msg" style="margin-top:8px;"></p>
        </form>
      </div>
    </div>

    <script>
      // Reutiliza tu theming actual
      const THEME_KEY = "crm_theme";
      function applyTheme(theme) {
        document.documentElement.setAttribute("data-theme", theme);
        localStorage.setItem(THEME_KEY, theme);
        const btn = document.getElementById("btnToggleTheme");
        if (btn) btn.textContent = theme === "dark" ? "Modo día" : "Modo noche";
      }
      document.addEventListener("DOMContentLoaded", () => {
        applyTheme(localStorage.getItem(THEME_KEY) || "light");
        document.getElementById("btnToggleTheme")?.addEventListener("click", () => {
          const current = document.documentElement.getAttribute("data-theme") || "light";
          applyTheme(current === "light" ? "dark" : "light");
        });
      });
    </script>
    <script src="auth.js"></script>

    <script src="login.js"></script>
  </body>
</html>
