<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CRM de PickingUp!</title>
  <link rel="stylesheet" href="styles.css" />
  <!-- Supabase JS v2 -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <main class="container">
    <h1>CRM de PickingUp!</h1>

    <!-- Controles superiores (Excel, filtros, usuario, tema) -->
    <section class="controls">
      <button id="btnDescargarModelo">Descargar modelo Excel</button>
      <button id="btnImportarExcel">Importar clientes desde Excel</button>
      <button id="btnExportarExcel">Exportar Excel</button>
      <a href="estadisticas.html" class="btn-link">Ver estadísticas</a>
      <input type="file" id="inputExcel" accept=".xlsx,.xls" style="display:none" />

      <!-- Selector de usuario actual -->
      <select id="usuarioActual">
        <option value="">Seleccionar usuario...</option>
        <option value="Toto">Toto</option>
        <option value="Ruben">Ruben</option>
        <option value="Tincho(B)">Tincho(B)</option>
        <option value="Fran">Fran</option>
        <option value="Ari">Ari</option>
        <option value="Nati">Nati</option>
        <option value="Dani">Dani</option>
        <option value="Otro">Otro</option>
      </select>

      <!-- Toggle tema -->
      <button type="button" id="btnToggleTheme" class="btn-secundario theme-toggle">
        Modo noche 🌙
      </button>

      <div class="filters">
        <input type="text" id="filtroNombre" placeholder="Buscar por nombre..." />
        <input type="text" id="filtroTelefono" placeholder="Buscar por teléfono..." />
        <select id="filtroRubro">
          <option value="">Todos los rubros</option>
        </select>
        <select id="filtroEstado">
          <option value="Todos">Todos los estados</option>
          <option value="1 - Cliente relevado">1 - Cliente relevado</option>
          <option value="2 - Local Visitado No Activo">2 - Local Visitado No Activo</option>
          <option value="3 - Primer ingreso">3 - Primer ingreso</option>
          <option value="4 - Local Visitado Activo">4 - Local Visitado Activo</option>
          <option value="5 - Local completo">5 - Local completo</option>
        </select>
        <button id="btnAplicarFiltros">Aplicar filtros</button>
      </div>
    </section>

    <!-- Formulario de alta/edición de cliente -->
    <section class="form-box">
      <h2 id="tituloForm">Nuevo cliente</h2>
      <form id="formCliente">
        <input type="hidden" id="clienteId" />

        <div class="grid">
          <div class="field">
            <label for="nombre">Nombre *</label>
            <input type="text" id="nombre" required />
          </div>

          <div class="field">
            <label for="telefono">Teléfono</label>
            <input type="text" id="telefono" />
          </div>

          <div class="field">
            <label for="rubro">Rubro</label>
            <input type="text" id="rubro" placeholder="Ej: Gastronomía, Retail..." />
          </div>

          <div class="field">
            <label for="estado">Estado</label>
            <select id="estado">
              <option value="1 - Cliente relevado">1 - Cliente relevado</option>
              <option value="2 - Local Visitado No Activo">2 - Local Visitado No Activo</option>
              <option value="3 - Primer ingreso">3 - Primer ingreso</option>
              <option value="4 - Local Visitado Activo">4 - Local Visitado Activo</option>
              <option value="5 - Local completo">5 - Local completo</option>
            </select>
          </div>

          <div class="field">
            <label for="fecha_proximo_contacto">Próximo contacto</label>
            <input type="date" id="fecha_proximo_contacto" />
          </div>

          <div class="field field-notas">
            <label for="notas">Notas</label>
            <textarea id="notas" rows="3" placeholder="Comentarios, acuerdos, próximos pasos..."></textarea>
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" id="btnGuardar">Guardar</button>
          <button type="button" id="btnCancelarEdicion" class="btn-secundario">Cancelar edición</button>
        </div>
      </form>
    </section>

    <!-- Lista de clientes -->
    <section>
      <h2>Clientes <span id="contador">(0)</span></h2>
      <div id="lista"></div>
    </section>
  </main>

  <!-- MODAL PARA ACTIVIDADES -->
  <div id="actividadModal" class="modal" style="display:none;">
    <div class="modal-content">
      <h3>Nueva actividad</h3>
      <textarea id="actividadTexto" rows="6" placeholder="Escribí la actividad... (se permiten saltos de línea)"></textarea>
      <div class="modal-actions">
        <button id="btnGuardarActividad">Guardar</button>
        <button id="btnCerrarActividad" class="btn-secundario">Cancelar</button>
      </div>
    </div>
  </div>

  <!-- XLSX para Excel -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
