<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CRM con Supabase</title>
  <link rel="stylesheet" href="styles.css" />
  <!-- Supabase JS v2 -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <main class="container">
    <h1>CRM con Supabase</h1>

    <!-- Controles superiores (Excel, filtros) -->
    <section class="controls">
      <button id="btnDescargarModelo">Descargar modelo Excel</button>
      <button id="btnImportarExcel">Importar clientes desde Excel</button>
      <input type="file" id="inputExcel" accept=".xlsx,.xls" style="display:none" />

      <div class="filters">
        <input type="text" id="filtroNombre" placeholder="Buscar por nombre..." />
        <input type="text" id="filtroRubro" placeholder="Filtrar por rubro..." />
        <select id="filtroEstado">
          <option value="Todos">Todos los estados</option>
          <option value="Nuevo">Nuevo</option>
          <option value="En seguimiento">En seguimiento</option>
          <option value="Ganado">Ganado</option>
          <option value="Perdido">Perdido</option>
        </select>
        <button id="btnAplicarFiltros">Aplicar filtros</button>
      </div>
    </section>

    <!-- Formulario de alta/edición de cliente -->
    <section class="form-box">
      <h2 id="tituloForm">Nuevo cliente</h2>
      <form id="formCliente">
        <input type="hidden" id="clienteId" />

        <div class="grid">
          <div class="field">
            <label for="nombre">Nombre *</label>
            <input type="text" id="nombre" required />
          </div>

          <div class="field">
            <label for="telefono">Teléfono</label>
            <input type="text" id="telefono" />
          </div>

          <div class="field">
            <label for="rubro">Rubro</label>
            <input type="text" id="rubro" placeholder="Ej: Gastronomía, Retail..." />
          </div>

          <div class="field">
            <label for="estado">Estado</label>
            <select id="estado">
              <option value="Nuevo">Nuevo</option>
              <option value="En seguimiento">En seguimiento</option>
              <option value="Ganado">Ganado</option>
              <option value="Perdido">Perdido</option>
            </select>
          </div>

          <div class="field">
            <label for="fecha_proximo_contacto">Próximo contacto</label>
            <input type="date" id="fecha_proximo_contacto" />
          </div>

          <div class="field field-notas">
            <label for="notas">Notas</label>
            <textarea id="notas" rows="3" placeholder="Comentarios, acuerdos, próximos pasos..."></textarea>
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" id="btnGuardar">Guardar</button>
          <button type="button" id="btnCancelarEdicion" class="btn-secundario">Cancelar edición</button>
        </div>
      </form>
    </section>

    <!-- Lista de clientes -->
    <section>
      <h2>Clientes <span id="contador">(0)</span></h2>
      <div id="lista"></div>
    </section>
  </main>

  <!-- XLSX para Excel -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
